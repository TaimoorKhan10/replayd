<svg viewBox="0 0 860 468" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Each clipPath reveals text left-to-right (typing effect).
         values="0;0;W;W;0;0" with keyTimes controlling when typing starts/ends.
         All use dur="14s" so they stay in sync across the loop. -->

    <clipPath id="c1">
      <rect x="20" y="54" height="20">
        <animate attributeName="width" values="0;0;280;280;0;0" keyTimes="0;0.021;0.054;0.893;0.964;1" dur="14s" repeatCount="indefinite" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="c3">
      <rect x="20" y="94" height="20">
        <animate attributeName="width" values="0;0;322;322;0;0" keyTimes="0;0.079;0.107;0.893;0.964;1" dur="14s" repeatCount="indefinite" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="c4">
      <rect x="20" y="114" height="20">
        <animate attributeName="width" values="0;0;555;555;0;0" keyTimes="0;0.129;0.168;0.893;0.964;1" dur="14s" repeatCount="indefinite" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="c5">
      <rect x="20" y="134" height="20">
        <animate attributeName="width" values="0;0;435;435;0;0" keyTimes="0;0.186;0.217;0.893;0.964;1" dur="14s" repeatCount="indefinite" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="c7">
      <rect x="20" y="174" height="20">
        <animate attributeName="width" values="0;0;197;197;0;0" keyTimes="0;0.250;0.271;0.893;0.964;1" dur="14s" repeatCount="indefinite" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="c8">
      <rect x="20" y="194" height="20">
        <animate attributeName="width" values="0;0;556;556;0;0" keyTimes="0;0.293;0.332;0.893;0.964;1" dur="14s" repeatCount="indefinite" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="c10">
      <rect x="20" y="234" height="20">
        <animate attributeName="width" values="0;0;226;226;0;0" keyTimes="0;0.364;0.386;0.893;0.964;1" dur="14s" repeatCount="indefinite" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="c11">
      <rect x="20" y="254" height="20">
        <animate attributeName="width" values="0;0;402;402;0;0" keyTimes="0;0.407;0.436;0.893;0.964;1" dur="14s" repeatCount="indefinite" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="c13">
      <rect x="20" y="294" height="20">
        <animate attributeName="width" values="0;0;326;326;0;0" keyTimes="0;0.471;0.489;0.893;0.964;1" dur="14s" repeatCount="indefinite" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="c14">
      <rect x="20" y="314" height="20">
        <animate attributeName="width" values="0;0;192;192;0;0" keyTimes="0;0.514;0.532;0.893;0.964;1" dur="14s" repeatCount="indefinite" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="c15">
      <rect x="20" y="334" height="20">
        <animate attributeName="width" values="0;0;562;562;0;0" keyTimes="0;0.571;0.611;0.893;0.964;1" dur="14s" repeatCount="indefinite" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="c17">
      <rect x="20" y="374" height="20">
        <animate attributeName="width" values="0;0;192;192;0;0" keyTimes="0;0.657;0.675;0.893;0.964;1" dur="14s" repeatCount="indefinite" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="c18">
      <rect x="20" y="394" height="20">
        <animate attributeName="width" values="0;0;536;536;0;0" keyTimes="0;0.714;0.754;0.893;0.964;1" dur="14s" repeatCount="indefinite" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="c19">
      <rect x="20" y="414" height="20">
        <animate attributeName="width" values="0;0;326;326;0;0" keyTimes="0;0.786;0.807;0.893;0.964;1" dur="14s" repeatCount="indefinite" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="c20">
      <rect x="20" y="434" height="20">
        <animate attributeName="width" values="0;0;234;234;0;0" keyTimes="0;0.821;0.843;0.893;0.964;1" dur="14s" repeatCount="indefinite" calcMode="linear"/>
      </rect>
