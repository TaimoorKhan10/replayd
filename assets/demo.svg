  </defs>

  <!-- background -->
  <rect width="860" height="468" fill="#0d1117" rx="12"/>

  <!-- title bar -->
  <rect width="860" height="36" fill="#161b22" rx="12"/>
  <rect y="24" width="860" height="12" fill="#161b22"/>

  <!-- window controls -->
  <circle cx="16" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="34" cy="18" r="6" fill="#febc2e"/>
  <circle cx="52" cy="18" r="6" fill="#28c840"/>

  <!-- title bar label -->
  <text x="430" y="23" text-anchor="middle" font-size="12" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#484f58">python examples/basic_example.py</text>

  <!-- blinking cursor — 3 blinks before typing, then gone -->
  <rect x="20" y="55" width="8" height="14" fill="#79c0ff">
    <animate attributeName="opacity" values="1;0;1;0;1;0;0" keyTimes="0;0.011;0.021;0.032;0.043;0.054;1" dur="14s" repeatCount="indefinite" calcMode="discrete"/>
  </rect>

  <!-- L1: prompt + command -->
  <text clip-path="url(#c1)" x="20" y="68" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#79c0ff">$ python examples/basic_example.py</text>

  <!-- L3: section header -->
  <text clip-path="url(#c3)" x="20" y="108" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#e6edf3">Capturing a refund-approval agent run...</text>

  <!-- L4: tool call — mixed colors, clip-path on text applies to all tspans -->
  <text clip-path="url(#c4)" x="20" y="128" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,monospace"><tspan fill="#8b949e">  agent called: </tspan><tspan fill="#f85149">approve_refund</tspan><tspan fill="#8b949e">(amount=1200)  [policy limit is $500]</tspan></text>

  <!-- L5: output -->
  <text clip-path="url(#c5)" x="20" y="148" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#8b949e">  output: {'action': 'approve_refund', 'amount': 1200}</text>

  <!-- L7: section header -->
  <text clip-path="url(#c7)" x="20" y="188" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#e6edf3">Marking run as failed...</text>

  <!-- L8: failure reason -->
  <text clip-path="url(#c8)" x="20" y="208" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#8b949e">  reason: agent approved refund of $1200, exceeding $500 policy limit</text>

  <!-- L10: section header -->
  <text clip-path="url(#c10)" x="20" y="248" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#e6edf3">Saving as regression test...</text>

  <!-- L11: test config -->
  <text clip-path="url(#c11)" x="20" y="268" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#8b949e">  forbidden: approve_refund  |  expected: escalate</text>

  <!-- L13: separator -->
  <text clip-path="url(#c13)" x="20" y="308" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#484f58">-----------------------------------------</text>

  <!-- L14: replay header -->
  <text clip-path="url(#c14)" x="20" y="328" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#e6edf3">Replay #1 -- buggy agent</text>

  <!-- L15: FAIL result — mixed colors -->
  <text clip-path="url(#c15)" x="20" y="348" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,monospace"><tspan fill="#8b949e">  </tspan><tspan fill="#f85149" font-weight="700">[FAIL]</tspan><tspan fill="#8b949e"> Forbidden action 'approve_refund' was called during replay.</tspan></text>

  <!-- L17: replay header -->
  <text clip-path="url(#c17)" x="20" y="388" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#e6edf3">Replay #2 -- fixed agent</text>

  <!-- L18: PASS result — mixed colors -->
  <text clip-path="url(#c18)" x="20" y="408" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,monospace"><tspan fill="#8b949e">  </tspan><tspan fill="#3fb950" font-weight="700">[PASS]</tspan><tspan fill="#8b949e"> No forbidden actions called; all expected actions present.</tspan></text>

  <!-- L19: separator -->
  <text clip-path="url(#c19)" x="20" y="428" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#484f58">-----------------------------------------</text>

  <!-- L20: summary -->
  <text clip-path="url(#c20)" x="20" y="448" font-size="13" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#3fb950">1 failure caught. 1 resolved.</text>
</svg>
